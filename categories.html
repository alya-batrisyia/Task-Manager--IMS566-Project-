<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="dashboard.html">Task Manager</a>

<div class="navbar-nav ms-auto">
<a class="nav-link" href="dashboard.html">Dashboard</a>
<a class="nav-link" href="tasks.html">Tasks</a>
<a class="nav-link active" href="categories.html">Categories</a>
<a class="nav-link" href="index.html">Logout</a>
</div>

</div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

<h2 class="mb-4">Task Categories</h2>

<div class="row">

<!-- Academic -->
<div class="col-md-4">
<div class="card p-3 shadow text-center" onclick="toggle('academic')">
<h4>📚 Academic</h4>
<p>Assignments & Study Tasks</p>
</div>
</div>

<!-- Work -->
<div class="col-md-4">
<div class="card p-3 shadow text-center" onclick="toggle('work')">
<h4>💼 Work</h4>
<p>Projects & Meetings</p>
</div>
</div>

<!-- Personal -->
<div class="col-md-4">
<div class="card p-3 shadow text-center" onclick="toggle('personal')">
<h4>🏠 Personal</h4>
<p>Daily Life Tasks</p>
</div>
</div>

</div>

<!-- CATEGORY LIST -->
<div class="mt-4">

<!-- Academic Tasks -->
<div id="academic" class="category-box d-none">
<div class="card p-3">

<h5>Academic Tasks</h5>

<ul id="academicList" class="list-group"></ul>

</div>
</div>

<!-- Work Tasks -->
<div id="work" class="category-box d-none">
<div class="card p-3">

<h5>Work Tasks</h5>

<ul id="workList" class="list-group"></ul>

</div>
</div>

<!-- Personal Tasks -->
<div id="personal" class="category-box d-none">
<div class="card p-3">

<h5>Personal Tasks</h5>

<ul id="personalList" class="list-group"></ul>

</div>
</div>

</div>

</div>

<script>
function getTasks(){
    return JSON.parse(localStorage.getItem("tasks")) || [];
}

// auto classify simple keyword-based
function classify(taskName){

    let name = taskName.toLowerCase();

    if(name.includes("project") || name.includes("assignment") || name.includes("quiz")){
        return "academic";
    }

    if(name.includes("meeting") || name.includes("work")){
        return "work";
    }

    return "personal";
}

function loadCategories(){

    let tasks = getTasks();

    let academic = [];
    let work = [];
    let personal = [];

    tasks.forEach(t => {

        let type = classify(t.name);

        if(type === "academic") academic.push(t.name);
        if(type === "work") work.push(t.name);
        if(type === "personal") personal.push(t.name);
    });

    renderList("academicList", academic);
    renderList("workList", work);
    renderList("personalList", personal);
}

function renderList(id, items){

    let list = document.getElementById(id);
    list.innerHTML = "";

    if(items.length === 0){
        list.innerHTML = "<li class='list-group-item text-muted'>No tasks</li>";
        return;
    }

    items.forEach(i=>{
        list.innerHTML += `<li class="list-group-item">${i}</li>`;
    });
}

// toggle section
function toggle(id){

    document.querySelectorAll(".category-box").forEach(box=>{
        if(box.id !== id){
            box.classList.add("d-none");
        }
    });

    document.getElementById(id).classList.toggle("d-none");
}

window.onload = loadCategories;
window.addEventListener("focus", loadCategories);
</script>

</body>
</html>
