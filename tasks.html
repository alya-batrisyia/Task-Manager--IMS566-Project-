<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tasks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="dashboard.html">Task Manager</a>

<div class="navbar-nav ms-auto">
<a class="nav-link" href="dashboard.html">Dashboard</a>
<a class="nav-link active" href="tasks.html">Tasks</a>
<a class="nav-link" href="categories.html">Categories</a>
<a class="nav-link" href="logout.html">Logout</a>
</div>

</div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

<h2 class="page-title">Task List</h2>

<div class="row">

<!-- FORM -->
<div class="col-md-4">

<div class="card shadow p-3">

<h5 id="formTitle">Add Task</h5>

<form id="taskForm">

<input type="hidden" id="editIndex">

<input type="text" id="taskName" class="form-control mb-2" placeholder="Task name" required>

<select id="taskStatus" class="form-control mb-2">
    <option value="Pending">Pending</option>
    <option value="Completed">Completed</option>
</select>

<button class="btn btn-primary w-100">Save Task</button>

</form>

</div>

</div>

<!-- TABLE -->
<div class="col-md-8">

<div class="card shadow">

<div class="card-body">

<table class="table table-striped">

<thead class="table-dark">
<tr>
<th>#</th>
<th>Task</th>
<th>Status</th>
</tr>
</thead>

<tbody id="taskTable"></tbody>

</table>

</div>

</div>

</div>

</div>
</div>

<!-- SCRIPT -->
<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

// LOAD TASKS
function loadTasks() {

    let table = document.getElementById("taskTable");
    table.innerHTML = "";

    tasks.forEach((task, index) => {

        let badge = task.status === "Completed"
            ? "bg-success"
            : "bg-warning text-dark";

        table.innerHTML += `
        <tr>
            <td>${index + 1}</td>
            <td>${task.name}</td>
            <td><span class="badge ${badge}">${task.status}</span></td>
        </tr>
        `;
    });
}

// SAVE TASK
document.getElementById("taskForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("taskName").value;
    let status = document.getElementById("taskStatus").value;

    tasks.push({
        name: name,
        status: status
    });

    localStorage.setItem("tasks", JSON.stringify(tasks));

    this.reset();

    loadTasks();
});

// INIT
window.addEventListener("load", loadTasks);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
